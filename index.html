const{useState,useEffect,useReducer,useMemo,useRef,useCallback}=React;

// ═══ MINIFIED APPS SCRIPT (for setup copy) ═══
const APPS_SCRIPT_CODE=`Paste the AppsScript-RentTracker-v2.js file — it is too large to embed here. Copy from the separate .js file provided.`;

const sv=(d,w=22)=>React.createElement('svg',{width:w,height:w,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round",dangerouslySetInnerHTML:{__html:d}});
const IC={home:sv('<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/>'),bld:sv('<rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4M8 6h.01M16 6h.01M12 6h.01M8 10h.01M16 10h.01M12 10h.01M8 14h.01M16 14h.01M12 14h.01"/>'),plus:sv('<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>'),rup:sv('<path d="M6 3h12M6 8h12M6 3c0 5 6 10 12 14M14 3c-2 4-6 6-8 5"/>'),back:sv('<polyline points="15,18 9,12 15,6"/>'),del:sv('<polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>',18),edit:sv('<path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>',18),cal:sv('<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',16),usr:sv('<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>',18),chk:sv('<polyline points="20,6 9,17 4,12"/>',18),sync:sv('<polyline points="23,4 23,10 17,10"/><polyline points="1,20 1,14 7,14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>',18),gear:sv('<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>'),copy:sv('<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>',16),link:sv('<path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>',18),cloud:sv('<path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/>',40),upload:sv('<polyline points="16,16 12,12 8,16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>',20),download:sv('<polyline points="8,17 12,21 16,17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0018 9h-1.26A8 8 0 103 16.29"/>',18),eye:sv('<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>',18),clip:sv('<path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>',16),arrowUp:sv('<line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/>',14),arrowDn:sv('<line x1="12" y1="5" x2="12" y2="19"/><polyline points="19,12 12,19 5,12"/>',14)};

// ═══ HELPERS ═══
const fmt=n=>new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(Number(n)||0);
const mkK=d=>{const t=new Date(d);return`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}`};
const mkL=k=>{const[y,m]=k.split("-");return new Date(y,m-1).toLocaleDateString("en-IN",{month:"short",year:"numeric"})};
const isA=p=>{const n=new Date(),s=new Date(p.startDate),e=p.endDate?new Date(p.endDate):null;return n>=s&&(!e||n<=e)};
const fSz=b=>{if(b<1024)return b+"B";if(b<1048576)return(b/1024).toFixed(1)+"KB";return(b/1048576).toFixed(1)+"MB"};
const fIc=m=>{if(m&&m.includes("pdf"))return{e:"📄",bg:"#ffebee",c:"#c62828"};if(m&&m.includes("image"))return{e:"🖼️",bg:"#e3f2fd",c:"#1565c0"};if(m&&(m.includes("word")||m.includes("doc")))return{e:"📝",bg:"#e8eaf6",c:"#283593"};return{e:"📎",bg:"#f5f5f5",c:"#455a64"}};
const isOwner=p=>p.role==="owner";

// ═══ RENT SLAB HELPERS ═══
function parseSlabs(p){try{const s=typeof p.rentSlabs==="string"?JSON.parse(p.rentSlabs):p.rentSlabs;return Array.isArray(s)&&s.length>0?s:null}catch{return null}}
function getSlabRent(property,monthDate){const slabs=parseSlabs(property);if(!slabs)return Number(property.rentAmount)||0;const d=new Date(monthDate);for(const slab of slabs){const s=new Date(slab.start);const e=new Date(slab.end);e.setDate(e.getDate()+1);if(d>=s&&d<e)return Number(slab.rent)||0}return Number(property.rentAmount)||0}
function getCurrentSlabRent(property){return getSlabRent(property,new Date())}
function getMonthsBetween(d1,d2){const a=new Date(d1),b=new Date(d2);return(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth())}

// ═══ SMART LEDGER ═══
function calcLedger(property,allRecords){const pr=allRecords.filter(r=>String(r.propertyId)===String(property.id));const start=new Date(property.startDate);const now=new Date();const end=property.endDate?new Date(property.endDate):now;const months=[];let carry=0;let d=new Date(start.getFullYear(),start.getMonth(),1);const limit=new Date(Math.min(end.getTime(),now.getTime()));limit.setDate(28);
while(d<=limit){const mk=mkK(d);const rent=getSlabRent(property,d);const payments=pr.filter(r=>mkK(r.date)===mk);const paid=payments.reduce((s,r)=>s+Number(r.amount),0);const due=Math.max(rent-carry,0);const effective=carry+paid;let status,diff;
if(effective>=rent){carry=effective-rent;if(paid===0&&carry>=rent){status="carry";diff=carry}else if(effective>rent&&paid>0){status="overpaid";diff=carry}else{status="paid";diff=0}}else{status=paid===0?"unpaid":"partial";diff=rent-effective;carry=0}
months.push({mk,label:mkL(mk),rent,due,paid,carry,status,diff,payments});d=new Date(d.getFullYear(),d.getMonth()+1,1)}return months}
function getCurrentStatus(p,recs){const l=calcLedger(p,recs);const mk=mkK(new Date());return l.find(m=>m.mk===mk)||null}
const stCfg={paid:{label:"PAID",emoji:"✅",bg:"#e8f5e9",color:"#2e7d32",border:"#a5d6a7"},partial:{label:"PARTIAL",emoji:"⚠️",bg:"#fff3e0",color:"#e65100",border:"#ffcc80"},unpaid:{label:"UNPAID",emoji:"❌",bg:"#ffebee",color:"#c62828",border:"#ef9a9a"},overpaid:{label:"OVERPAID",emoji:"💰",bg:"#e3f2fd",color:"#0d47a1",border:"#90caf9"},carry:{label:"CARRIED",emoji:"➡️",bg:"#e3f2fd",color:"#0d47a1",border:"#90caf9"}};
function STag({status,diff,small}){const c=stCfg[status]||stCfg.unpaid;return<span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:small?9:10,fontWeight:800,padding:small?"2px 6px":"3px 10px",borderRadius:20,background:c.bg,color:c.color,letterSpacing:.5,whiteSpace:"nowrap"}}>{c.emoji} {c.label}{diff>0&&status!=="paid"?" "+fmt(diff):""}</span>}

// ═══ STORAGE & API ═══
const LK="rt_url",LD="rt_data";
function gUrl(){try{return localStorage.getItem(LK)||""}catch{return""}}function sUrl(u){try{localStorage.setItem(LK,u)}catch{}}
function gData(){try{const d=localStorage.getItem(LD);return d?JSON.parse(d):null}catch{return null}}function sData(d){try{localStorage.setItem(LD,JSON.stringify(d))}catch{}}
async function sheetGet(url){try{const r=await fetch(url);const d=await r.json();if(d.success){sData(d);return d}throw 0}catch{return null}}
async function sheetPost(url,action,payload){try{const r=await fetch(url,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action,payload})});const d=await r.json();if(d.success){sData(d);return d}throw 0}catch{return null}}

// ═══ REDUCER ═══
const init={properties:[],rentRecords:[],documents:[],view:"dashboard",selProp:null,editProp:null,role:"owner"};
function reducer(s,a){switch(a.type){case "SD":return{...s,properties:a.p.properties||[],rentRecords:a.p.rentRecords||[],documents:a.p.documents||[]};case "SV":return{...s,view:a.p};case "SR":return{...s,role:a.p};case "SEL":return{...s,selProp:a.p,view:"detail"};case "EDT":return{...s,editProp:a.p,view:"editProp"};case "LAP":return{...s,properties:[...s.properties,a.p],view:"properties"};case "LUP":return{...s,properties:s.properties.map(p=>p.id===a.p.id?a.p:p),view:"properties",editProp:null};case "LDP":return{...s,properties:s.properties.filter(p=>p.id!==a.p),rentRecords:s.rentRecords.filter(r=>r.propertyId!==a.p),documents:s.documents.filter(d=>d.propertyId!==a.p),view:"properties",selProp:null};case "LAR":return{...s,rentRecords:[...s.rentRecords,a.p]};case "LDR":return{...s,rentRecords:s.rentRecords.filter(r=>r.id!==a.p)};case "LDOC":return{...s,documents:[...s.documents,a.p]};case "RMDOC":return{...s,documents:s.documents.filter(d=>d.id!==a.p)};default:return s}}

// ═══ DOC UPLOADER ═══
function DocUp({propertyId,sheetUrl,documents,dispatch:d}){const[uploading,setUploading]=useState(false);const[dragOver,setDragOver]=useState(false);const fileRef=useRef();const docs=(documents||[]).filter(x=>String(x.propertyId)===String(propertyId));
const handleFiles=async files=>{if(!files||!files.length)return;for(const file of files){if(file.size>10*1024*1024){alert("Max 10MB: "+file.name);continue}setUploading(true);const reader=new FileReader();reader.onload=async e=>{const b64=e.target.result.split(",")[1];const pl={id:Date.now().toString(),propertyId,fileName:file.name,mimeType:file.type,fileSize:file.size,fileData:b64};if(sheetUrl){const res=await sheetPost(sheetUrl,"uploadDocument",pl);if(res){d({type:"SD",p:res});setUploading(false);return}}d({type:"LDOC",p:{id:pl.id,propertyId,fileName:file.name,mimeType:file.type,fileSize:file.size,viewUrl:"",downloadUrl:"",uploadDate:new Date().toISOString()}});setUploading(false)};reader.readAsDataURL(file)}};
const handleDel=async id=>{if(!confirm("Delete this document?"))return;if(sheetUrl){const r=await sheetPost(sheetUrl,"deleteDocument",{id});if(r){d({type:"SD",p:r});return}}d({type:"RMDOC",p:id})};
return(<div style={{marginTop:8}}><h4 style={{fontSize:13,fontWeight:800,color:"#263238",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>{IC.clip} Agreement Documents</h4>
<div className={"dz"+(dragOver?" drg":"")} onClick={()=>fileRef.current?.click()} onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)} onDrop={e=>{e.preventDefault();setDragOver(false);handleFiles(e.dataTransfer.files)}}><input ref={fileRef} type="file" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.txt" multiple style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
{uploading?<div><div style={{color:"var(--dk)",fontWeight:700,fontSize:13,marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><span style={{animation:"spin 1s linear infinite",display:"inline-flex"}}>{IC.sync}</span> Uploading…</div><div className="uprog"><div className="ubar" style={{width:"70%"}}/></div></div>
:<div><div style={{color:"var(--dk)",marginBottom:6}}>{IC.upload}</div><div style={{fontWeight:700,fontSize:13,color:"var(--dk)"}}>Tap to upload</div><div style={{fontSize:11,color:"var(--subtle)",marginTop:4}}>PDF, DOC, JPG, PNG · Max 10MB</div></div>}</div>
{docs.length>0&&<div style={{marginTop:8}}>{docs.map(doc=>{const fi=fIc(doc.mimeType);return<div key={doc.id} className="dc"><div className="di" style={{background:fi.bg,color:fi.c}}>{fi.e}</div><div className="dinfo"><div className="dn">{doc.fileName}</div><div className="dm">{doc.fileSize?fSz(Number(doc.fileSize)):""}{doc.uploadDate?" · "+new Date(doc.uploadDate).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"}):""}
</div></div><div className="da">{doc.viewUrl&&<a href={doc.viewUrl} target="_blank" rel="noopener" className="dab" style={{background:"#e3f2fd",color:"#1565c0"}}>{IC.eye}</a>}{doc.downloadUrl&&<a href={doc.downloadUrl} target="_blank" rel="noopener" className="dab" style={{background:"#e8f5e9",color:"#2e7d32"}}>{IC.download}</a>}<button className="dab" style={{background:"#ffebee",color:"#c62828"}} onClick={()=>handleDel(doc.id)}>{IC.del}</button></div></div>})}</div>}
{docs.length===0&&!uploading&&<p style={{fontSize:12,color:"var(--subtle)",marginTop:10,textAlign:"center"}}>No documents uploaded yet</p>}</div>)}

// ═══ SETUP ═══
function Setup({onSave,existing}){const[url,setUrl]=useState(existing||"");const[copied,setCopied]=useState(false);const[step,setStep]=useState(1);
const doCopy=()=>{navigator.clipboard.writeText("See the AppsScript-RentTracker-v2.js file").then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000)})};
return(<div className="setup-shell"><div className="setup-head"><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>{IC.cloud}<h1 style={{fontSize:22,fontWeight:800,margin:0}}>Connect Google Sheet</h1></div><p style={{fontSize:13,opacity:.8,lineHeight:1.5}}>Link a Google Sheet so everyone sees the same data.</p></div>

<button className="skbtn" onClick={()=>onSave("")}>Skip — Use Locally</button></div>}
</div></div>)}

// ═══ RENT ALERT ═══
function RentAlert({properties,rentRecords}){const now=new Date(),day=now.getDate(),mk=mkK(now);const mName=now.toLocaleDateString("en-IN",{month:"long",year:"numeric"});const active=properties.filter(isA);
const statuses=active.map(p=>{const cs=getCurrentStatus(p,rentRecords);return{...p,cs}});
const unpaid=statuses.filter(s=>s.cs&&(s.cs.status==="unpaid"||s.cs.status==="partial"));
const[expanded,setExpanded]=useState(day>=10&&unpaid.length>0);
if(active.length===0)return null;
if(day<10&&unpaid.length===0)return null;
const isUrg=day>=10&&unpaid.length>0;
return(<div style={{background:isUrg?"#fff5f5":"#f0faf0",border:isUrg?"2px solid #ffcdd2":"2px solid #c8e6c9",borderRadius:18,padding:0,marginBottom:14,overflow:"hidden",animation:"slideUp .3s ease"}}>
<button onClick={()=>setExpanded(!expanded)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"14px 16px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}>
<span style={{fontSize:24}}>{isUrg?"🔔":"📋"}</span>
<div style={{flex:1}}><div style={{fontSize:13,fontWeight:800,color:isUrg?"#c62828":"#1b5e20"}}>{isUrg?unpaid.length+" pending — "+mName:"Status — "+mName}</div>
<div style={{fontSize:11,color:isUrg?"#e57373":"#66bb6a",marginTop:2}}>{active.length-unpaid.length} settled · {unpaid.length} pending</div></div>
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={isUrg?"#c62828":"#2e7d32"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transform:expanded?"rotate(180deg)":"rotate(0)",transition:"transform .3s"}}><polyline points="6,9 12,15 18,9"/></svg></button>
{expanded&&<div style={{padding:"0 16px 14px"}}>{statuses.map(s=>{const c=s.cs||{status:"unpaid",diff:Number(s.rentAmount),paid:0,carry:0};const sc=stCfg[c.status]||stCfg.unpaid;const own=isOwner(s);
return(<div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:sc.bg,borderRadius:12,marginBottom:6,borderLeft:"4px solid "+sc.border}}>
<div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:"#263238",display:"flex",alignItems:"center",gap:6}}><span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.name}</span><span className={"rbadge "+(own?"owner":"tenant")}>{own?"Owner":"Tenant"}</span></div>
<div style={{fontSize:11,color:"#78909c"}}>{own?(c.status==="unpaid"||c.status==="partial"?"Tenant hasn't paid":"Tenant paid "+fmt(c.paid)):(c.status==="unpaid"||c.status==="partial"?"You owe "+fmt(c.diff):"You paid "+fmt(c.paid))}</div>
</div><STag status={c.status} diff={c.diff}/></div>)})}</div>}</div>)}

// ═══ DASHBOARD ═══
function Dash({state:s,dispatch:d,syncStatus:ss,onSync,onSettings}){const now=new Date(),mk=mkK(now),recs=s.rentRecords;
const ownerProps=s.properties.filter(p=>isOwner(p)&&isA(p));const tenantProps=s.properties.filter(p=>!isOwner(p)&&isA(p));
const collected=recs.filter(r=>{const p=s.properties.find(p=>String(p.id)===String(r.propertyId));return p&&isOwner(p)&&mkK(r.date)===mk}).reduce((a,r)=>a+Number(r.amount),0);
const paid=recs.filter(r=>{const p=s.properties.find(p=>String(p.id)===String(r.propertyId));return p&&!isOwner(p)&&mkK(r.date)===mk}).reduce((a,r)=>a+Number(r.amount),0);
const expCollect=ownerProps.reduce((a,p)=>a+getCurrentSlabRent(p),0);
const expPay=tenantProps.reduce((a,p)=>a+getCurrentSlabRent(p),0);

const l6=useMemo(()=>{const ms=[];for(let i=5;i>=0;i--){const dt=new Date(now.getFullYear(),now.getMonth()-i,1);ms.push(mkK(dt))}
return ms.map(m=>{const inc=recs.filter(r=>{const p=s.properties.find(p=>String(p.id)===String(r.propertyId));return p&&isOwner(p)&&mkK(r.date)===m}).reduce((a,r)=>a+Number(r.amount),0);
const exp=recs.filter(r=>{const p=s.properties.find(p=>String(p.id)===String(r.propertyId));return p&&!isOwner(p)&&mkK(r.date)===m}).reduce((a,r)=>a+Number(r.amount),0);
return{key:m,label:mkL(m),inc,exp}})},[recs,s.properties]);
const mx=Math.max(...l6.map(m=>Math.max(m.inc,m.exp)),1);

return(<div className="shell"><div className="topbar"><div className="tl"><h1>Dashboard</h1></div><div className="tr"><button className="sbtn" onClick={onSync}><span className={"sdot "+ss}/>{ss==="synced"?"Synced":ss==="syncing"?"…":ss==="error"?"Error":"Local"}{IC.sync}</button><button className="gbtn" onClick={onSettings}>{IC.gear}</button></div></div>
<div className="scroll">
  {/* Income vs Expense cards */}
  <div style={{display:"flex",gap:10,marginBottom:10}}>
    <div className="sc" style={{background:"linear-gradient(135deg,#1b5e20,#388e3c)"}}><span className="scl">Rent Collected ↑</span><span className="scv">{fmt(collected)}</span><span className="scs">of {fmt(expCollect)} from {ownerProps.length} properties</span></div>
    <div className="sc" style={{background:"linear-gradient(135deg,#b71c1c,#e53935)"}}><span className="scl">Rent Paid ↓</span><span className="scv">{fmt(paid)}</span><span className="scs">of {fmt(expPay)} for {tenantProps.length} properties</span></div>
  </div>
  <div style={{display:"flex",gap:10,marginBottom:14}}>
    <div className="sc" style={{background:"linear-gradient(135deg,#4a148c,#7b1fa2)"}}><span className="scl">Active / Total</span><span className="scv">{s.properties.filter(isA).length}/{s.properties.length}</span><span className="scs">properties</span></div>
    <div className="sc" style={{background:"linear-gradient(135deg,#33691e,#558b2f)"}}><span className="scl">Documents</span><span className="scv">{(s.documents||[]).length}</span><span className="scs">uploaded</span></div>
  </div>

  <RentAlert properties={s.properties} rentRecords={recs}/>

  {/* Split chart */}
  <div className="sec"><h3>Last 6 Months</h3>
    <div style={{display:"flex",gap:12,marginBottom:8,justifyContent:"center"}}><span style={{display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#2e7d32"}}><span style={{width:10,height:10,borderRadius:3,background:"linear-gradient(180deg,#66bb6a,#1b5e20)"}}/>Collected</span><span style={{display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#c62828"}}><span style={{width:10,height:10,borderRadius:3,background:"linear-gradient(180deg,#ef9a9a,#b71c1c)"}}/>Paid</span></div>
    <div className="bar-c">{l6.map(m=><div key={m.key} className="bar-col">
      <span className="bar-v">{m.inc>0?fmt(m.inc):""}</span>
      <div style={{display:"flex",gap:2,alignItems:"flex-end",width:"80%",justifyContent:"center"}}>
        <div className="bar" style={{width:"45%",height:Math.max((m.inc/mx)*110,4)+"px",background:"linear-gradient(180deg,#66bb6a,#1b5e20)"}}/>
        <div className="bar" style={{width:"45%",height:Math.max((m.exp/mx)*110,4)+"px",background:"linear-gradient(180deg,#ef9a9a,#b71c1c)"}}/>
      </div>
      <span className="bar-v" style={{color:"#c62828"}}>{m.exp>0?fmt(m.exp):""}</span>
      <span className="bar-l">{m.label.split(" ")[0]}</span>
    </div>)}</div>
  </div>

  {/* Recent Activity */}
  <div className="sec"><h3>Recent Activity</h3>
    {recs.length===0?<p className="empty">No records yet.</p>:recs.slice(-6).reverse().map(r=>{const p=s.properties.find(p=>String(p.id)===String(r.propertyId));const own=p&&isOwner(p);
    return<div key={r.id} className="li"><div><div style={{display:"flex",alignItems:"center",gap:6}}><div className="lit">{p?.name||"Unknown"}</div><span className={"dir "+(own?"in":"out")}>{own?"↑ In":"↓ Out"}</span></div><div className="lis">{new Date(r.date).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}</div></div>
    <div style={{textAlign:"right"}}><div style={{fontWeight:800,color:own?"var(--inc)":"var(--exp)",fontFamily:"var(--mono)"}}>{own?"+":"-"}{fmt(r.amount)}</div><div className="lis">{r.month}</div></div></div>})}
  </div>
  <div style={{height:80}}/>
</div>
<div className="nav">{[{k:"dashboard",i:IC.home,l:"Dashboard"},{k:"properties",i:IC.bld,l:"Properties"},{k:"collect",i:IC.rup,l:"Collect"}].map(t=><button key={t.k} className={"nb"+(s.view===t.k?" a":"")} onClick={()=>d({type:"SV",p:t.k})}><div className={s.view===t.k?"npill":""}>{t.i}</div><span className="nlbl">{t.l}</span></button>)}</div></div>)}

// ═══ PROPERTY LIST ═══
function PList({state:s,dispatch:d,syncStatus:ss,onSync,onSettings}){return(
<div className="shell"><div className="topbar"><div className="tl"><h1>Properties</h1></div><div className="tr"><button className="sbtn" onClick={onSync}><span className={"sdot "+ss}/>{IC.sync}</button><button className="gbtn" onClick={onSettings}>{IC.gear}</button></div></div>
<div className="scroll">{s.properties.length===0?<div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"60px 20px",textAlign:"center"}}><div style={{fontSize:52,marginBottom:12}}>🏠</div><p className="empty">No properties yet.</p><button className="pbtn" onClick={()=>d({type:"SV",p:"addProp"})}>{IC.plus}<span style={{marginLeft:6}}>Add Property</span></button></div>
:<>{s.properties.map(p=>{const dc=(s.documents||[]).filter(x=>String(x.propertyId)===String(p.id)).length;const cs=isA(p)?getCurrentStatus(p,s.rentRecords):null;const own=isOwner(p);
return<div key={p.id} className="pc" onClick={()=>d({type:"SEL",p:p.id})}>

<span className={"chip "+(isA(p)?"ac":"en")}><span className="cdot"/>{isA(p)?"Active":"Ended"}</span></div>

<div style={{height:80}}/></div>
<div className="nav">{[{k:"dashboard",i:IC.home,l:"Dashboard"},{k:"properties",i:IC.bld,l:"Properties"},{k:"collect",i:IC.rup,l:"Collect"}].map(t=><button key={t.k} className={"nb"+(s.view===t.k?" a":"")} onClick={()=>d({type:"SV",p:t.k})}><div className={s.view===t.k?"npill":""}>{t.i}</div><span className="nlbl">{t.l}</span></button>)}</div></div>)}

// ═══ PROPERTY FORM ═══
function PForm({state:s,dispatch:d,sheetUrl}){const ed=s.editProp?s.properties.find(p=>p.id===s.editProp):null;
const[f,setF]=useState(ed?{...ed,rentSlabs:ed.rentSlabs||""}:{name:"",address:"",rentAmount:"",deposit:"",startDate:"",endDate:"",tenantName:"",ownerName:"",role:s.role,notes:"",rentSlabs:""});
const[err,setErr]=useState({});const[saving,setSaving]=useState(false);
const[slabs,setSlabs]=useState(()=>{try{const s=ed&&ed.rentSlabs?JSON.parse(typeof ed.rentSlabs==="string"?ed.rentSlabs:JSON.stringify(ed.rentSlabs)):[];return Array.isArray(s)?s:[]}catch{return[]}});

const duration=f.startDate&&f.endDate?getMonthsBetween(f.startDate,f.endDate):0;
const showSlabs=duration>11;

// Auto-generate first slab when duration crosses 11 months
useEffect(()=>{
  if(showSlabs&&slabs.length===0&&f.startDate&&f.endDate&&f.rentAmount){
    const start=new Date(f.startDate);const end=new Date(f.endDate);const rent=Number(f.rentAmount);
    const newSlabs=[];let cur=new Date(start);
    while(cur<end){
      const slabEnd=new Date(cur.getFullYear(),cur.getMonth()+11,cur.getDate()-1);
      const actualEnd=slabEnd>end?end:slabEnd;
      const slabIdx=newSlabs.length;
      newSlabs.push({start:cur.toISOString().split("T")[0],end:actualEnd.toISOString().split("T")[0],rent:Math.round(rent*Math.pow(1.1,slabIdx))});
      cur=new Date(actualEnd);cur.setDate(cur.getDate()+1);
    }
    setSlabs(newSlabs);
  }
},[showSlabs,f.startDate,f.endDate,f.rentAmount]);

const updateSlab=(i,field,val)=>{const ns=[...slabs];ns[i]={...ns[i],[field]:val};setSlabs(ns)};
const addSlab=()=>{const last=slabs[slabs.length-1];if(last){const nextStart=new Date(last.end);nextStart.setDate(nextStart.getDate()+1);const nextEnd=new Date(nextStart);nextEnd.setMonth(nextEnd.getMonth()+11);const endD=new Date(f.endDate);if(nextEnd>endD)nextEnd.setTime(endD.getTime());setSlabs([...slabs,{start:nextStart.toISOString().split("T")[0],end:nextEnd.toISOString().split("T")[0],rent:Math.round(Number(last.rent)*1.1)}])}else{setSlabs([{start:f.startDate,end:f.endDate,rent:f.rentAmount}])}};
const removeSlab=i=>{setSlabs(slabs.filter((_,idx)=>idx!==i))};

const val=()=>{const e={};if(!f.name.trim())e.name="Required";if(!f.rentAmount||Number(f.rentAmount)<=0)e.rentAmount="Enter valid amount";if(!f.startDate)e.startDate="Required";if(f.endDate&&f.endDate<f.startDate)e.endDate="Must be after start";if(showSlabs&&slabs.length<2)e.slabs="Add at least 2 slabs for escalation";setErr(e);return!Object.keys(e).length};
const save=async()=>{if(!val())return;setSaving(true);const pl=ed?{...f}:{...f,id:Date.now().toString()};pl.rentSlabs=showSlabs&&slabs.length>0?JSON.stringify(slabs):"";if(sheetUrl){const r=await sheetPost(sheetUrl,ed?"updateProperty":"addProperty",pl);if(r){d({type:"SD",p:r});d({type:"SV",p:"properties"});setSaving(false);return}}d({type:ed?"LUP":"LAP",p:pl});setSaving(false)};
return(<div className="shell"><div className="topbar"><div className="tl"><button className="bbtn" onClick={()=>d({type:"SV",p:"properties"})}>{IC.back}</button><h1>{ed?"Edit":"Add"} Property</h1></div></div>
<div className="scroll"><div className="card">
<label className="lbl">Property Name *</label><input className={"inp"+(err.name?" er":"")} placeholder="e.g. Green Valley Apt 301" value={f.name} onChange={e=>setF({...f,name:e.target.value})}/>{err.name&&<span className="ert">{err.name}</span>}
<label className="lbl">Address</label><input className="inp" placeholder="Full address" value={f.address} onChange={e=>setF({...f,address:e.target.value})}/>
<label className="lbl">Monthly Rent (₹) *</label><input className={"inp"+(err.rentAmount?" er":"")} type="number" placeholder="15000" value={f.rentAmount} onChange={e=>setF({...f,rentAmount:e.target.value})}/>{err.rentAmount&&<span className="ert">{err.rentAmount}</span>}
<label className="lbl">Security Deposit (₹)</label><input className="inp" type="number" placeholder="50000" value={f.deposit} onChange={e=>setF({...f,deposit:e.target.value})}/>
<div style={{display:"flex",gap:12}}><div style={{flex:1}}><label className="lbl">Start Date *</label><input className={"inp"+(err.startDate?" er":"")} type="date" value={f.startDate} onChange={e=>setF({...f,startDate:e.target.value})}/>{err.startDate&&<span className="ert">{err.startDate}</span>}</div><div style={{flex:1}}><label className="lbl">End Date</label><input className={"inp"+(err.endDate?" er":"")} type="date" value={f.endDate} onChange={e=>setF({...f,endDate:e.target.value})}/>{err.endDate&&<span className="ert">{err.endDate}</span>}</div></div>
{duration>0&&<div style={{fontSize:12,color:"var(--muted)",marginTop:6}}>Duration: {duration} months{duration>11?" — rent escalation slabs enabled":""}</div>}

{showSlabs&&<div style={{marginTop:14,background:"#f3e5f5",borderRadius:16,padding:16,border:"2px solid #ce93d8"}}>
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
    <div><div style={{fontSize:13,fontWeight:800,color:"#6a1b9a"}}>📈 Rent Escalation Slabs</div><div style={{fontSize:11,color:"#9c27b0",marginTop:2}}>Define rent for each period</div></div>
  </div>
  {slabs.map((slab,i)=>(
    <div key={i} style={{background:"#fff",borderRadius:14,padding:14,marginBottom:8,border:"1px solid #e1bee7",position:"relative"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontSize:12,fontWeight:800,color:"#6a1b9a",background:"#f3e5f5",padding:"2px 10px",borderRadius:8}}>Slab {i+1}</span>
        {slabs.length>1&&<button onClick={()=>removeSlab(i)} style={{background:"#ffebee",border:"none",borderRadius:8,padding:"4px 8px",cursor:"pointer",display:"flex",color:"#c62828",fontSize:11,fontWeight:700}}>Remove</button>}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:6}}>
        <div style={{flex:1}}><label style={{fontSize:10,fontWeight:700,color:"#78909c",display:"block",marginBottom:3}}>From</label><input className="inp" type="date" value={slab.start} onChange={e=>updateSlab(i,"start",e.target.value)} style={{fontSize:12,padding:"8px 10px"}}/></div>
        <div style={{flex:1}}><label style={{fontSize:10,fontWeight:700,color:"#78909c",display:"block",marginBottom:3}}>To</label><input className="inp" type="date" value={slab.end} onChange={e=>updateSlab(i,"end",e.target.value)} style={{fontSize:12,padding:"8px 10px"}}/></div>
      </div>
      <div><label style={{fontSize:10,fontWeight:700,color:"#78909c",display:"block",marginBottom:3}}>Rent Amount (₹)</label><input className="inp" type="number" value={slab.rent} onChange={e=>updateSlab(i,"rent",e.target.value)} placeholder="15000" style={{fontSize:14,padding:"10px 14px"}}/></div>
    </div>
  ))}
  <button onClick={addSlab} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,width:"100%",padding:10,borderRadius:12,border:"2px dashed #ce93d8",background:"transparent",color:"#6a1b9a",fontSize:13,fontWeight:700,cursor:"pointer",marginTop:4}}>{IC.plus} Add Slab</button>
  {err.slabs&&<span className="ert" style={{marginTop:6}}>{err.slabs}</span>}
</div>}
<label className="lbl">My Role</label><div className="tog">{["owner","tenant"].map(r=><button key={r} className={"tb"+(f.role===r?" a":"")} onClick={()=>setF({...f,role:r})}><span style={{textTransform:"capitalize"}}>{r}</span></button>)}</div>
{f.role==="owner"&&<><label className="lbl">Tenant Name</label><input className="inp" placeholder="Tenant's name" value={f.tenantName} onChange={e=>setF({...f,tenantName:e.target.value})}/></>}
{f.role==="tenant"&&<><label className="lbl">Owner Name</label><input className="inp" placeholder="Owner's name" value={f.ownerName} onChange={e=>setF({...f,ownerName:e.target.value})}/></>}
<label className="lbl">Notes</label><textarea className="inp" style={{minHeight:70,resize:"vertical"}} placeholder="Any notes..." value={f.notes} onChange={e=>setF({...f,notes:e.target.value})}/>
<button className="pbtn" disabled={saving} style={{opacity:saving?.6:1}} onClick={save}>{saving?IC.sync:IC.chk}<span style={{marginLeft:6}}>{saving?"Saving…":ed?"Update":"Add Property"}</span></button>
</div></div></div>)}

// ═══ PROPERTY DETAIL — SWIPEABLE 2 PAGES ═══
function Detail({state:s,dispatch:d,sheetUrl}){
const p=s.properties.find(p=>String(p.id)===String(s.selProp));
const[page,setPage]=useState(0); // 0=Overview, 1=Details
if(!p)return null;
const recs=s.rentRecords.filter(r=>String(r.propertyId)===String(p.id));
const total=recs.reduce((a,r)=>a+Number(r.amount),0);
const own=isOwner(p);
const hDel=async()=>{if(!confirm("Delete property, records & documents?"))return;if(sheetUrl){const r=await sheetPost(sheetUrl,"deleteProperty",{id:p.id});if(r){d({type:"SD",p:r});d({type:"SV",p:"properties"});return}}d({type:"LDP",p:p.id})};
const hDelR=async id=>{if(sheetUrl){const r=await sheetPost(sheetUrl,"deleteRentRecord",{id});if(r){d({type:"SD",p:r});return}}d({type:"LDR",p:id})};

return(<div className="shell"><div className="topbar"><div className="tl"><button className="bbtn" onClick={()=>d({type:"SV",p:"properties"})}>{IC.back}</button><h1>{p.name}</h1></div><span className={"rbadge "+(own?"owner":"tenant")} style={{marginRight:4}}>{own?"Owner":"Tenant"}</span></div>
<div className="scroll">
  {/* Page tabs */}
  <div className="ptabs"><button className={"ptab"+(page===0?" a":"")} onClick={()=>setPage(0)}>Overview</button><button className={"ptab"+(page===1?" a":"")} onClick={()=>setPage(1)}>Details</button></div>

  {page===0&&<div style={{animation:"slideR .25s ease"}}>
    {/* Status header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div><span className={"chip "+(isA(p)?"ac":"en")}><span className="cdot"/>{isA(p)?"Active":"Ended"}</span></div>
      {isA(p)&&(()=>{const cs=getCurrentStatus(p,s.rentRecords);return cs?<STag status={cs.status} diff={cs.diff}/>:null})()}
    </div>

    {/* Core stats */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
      <div className="db"><span className="dbl">Current Rent/Mo</span><span className="dbv">{fmt(getCurrentSlabRent(p))}</span></div>
      <div className="db"><span className="dbl">Total {own?"Collected":"Paid"}</span><span className="dbv">{fmt(total)}</span></div>
    </div>

    {/* Actions */}
    <div style={{display:"flex",gap:10,marginBottom:14}}><button className="obtn" onClick={()=>d({type:"EDT",p:p.id})}>{IC.edit}<span style={{marginLeft:4}}>Edit</span></button><button className="dbtn2" onClick={hDel}>{IC.del}<span style={{marginLeft:4}}>Delete</span></button></div>

    {/* Rent Ledger */}
    <div className="sec"><h3>Rent Ledger</h3>
    {(()=>{const ledger=calcLedger(p,s.rentRecords);if(ledger.length===0)return<p className="empty">No history yet.</p>;
      return ledger.slice().reverse().map(m=>
        <div key={m.mk} style={{padding:"12px 0",borderBottom:"1px solid #eceff1"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:m.payments.length>0?6:0}}>
            <div><div className="lit">{m.label}</div><div className="lis">Due: {fmt(m.due)}{m.carry>0?" · Carry: "+fmt(m.carry):""}</div></div>
            <STag status={m.status} diff={m.diff}/></div>
          {m.payments.length>0&&m.payments.map((r,i)=>
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginLeft:12,padding:"4px 0"}}>
              <span style={{width:4,height:4,borderRadius:"50%",background:"var(--subtle)",flexShrink:0}}/>
              <span style={{fontSize:12,color:"#546e7a",flex:1}}>{new Date(r.date).toLocaleDateString("en-IN",{day:"numeric",month:"short"})}</span>
              <span style={{fontWeight:800,color:"var(--dk)",fontFamily:"var(--mono)",fontSize:13}}>{fmt(r.amount)}</span>
              <button style={{background:"none",border:"none",color:"#b0bec5",cursor:"pointer",padding:4,display:"flex"}} onClick={()=>hDelR(r.id)}>{IC.del}</button></div>)}
        </div>)})()}
    </div>
  </div>}

  {page===1&&<div style={{animation:"slideL .25s ease"}}>
    {/* Deposit */}
    <div className="sec">
      <h3>{own?"Deposit Received":"Deposit Paid"}</h3>
      {p.deposit&&Number(p.deposit)>0?
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{background:own?"#e8f5e9":"#ffebee",borderRadius:14,padding:"16px 20px",flex:1,textAlign:"center"}}>
            <div style={{fontSize:11,fontWeight:800,color:own?"#2e7d32":"#c62828",textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>{own?"Received from Tenant":"Paid to Owner"}</div>
            <div style={{fontSize:24,fontWeight:800,color:own?"#1b5e20":"#b71c1c",fontFamily:"var(--mono)"}}>{fmt(p.deposit)}</div>
          </div>
        </div>
        :<p style={{fontSize:13,color:"var(--subtle)"}}>No deposit recorded</p>}
    </div>

    {/* Rent Slabs */}
    {parseSlabs(p)&&<div className="sec"><h3>Rent Escalation Slabs</h3>
      {parseSlabs(p).map((slab,i)=>{const now=new Date(),ss=new Date(slab.start),se=new Date(slab.end);const isCurrent=now>=ss&&now<=se;return(
        <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:isCurrent?"#e8f5e9":"#f5f5f5",borderRadius:12,marginBottom:6,borderLeft:isCurrent?"4px solid #4caf50":"4px solid #e0e0e0"}}>
          <div style={{width:28,height:28,borderRadius:"50%",background:isCurrent?"#2e7d32":"#bdbdbd",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,flexShrink:0}}>{i+1}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:700,color:"#263238"}}>{fmt(slab.rent)}<span style={{fontWeight:500,color:"var(--muted)"}}>/mo</span></div>
            <div style={{fontSize:11,color:"var(--subtle)"}}>{new Date(slab.start).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"})} → {new Date(slab.end).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"})}</div>
          </div>
          {isCurrent&&<span style={{fontSize:10,fontWeight:800,color:"#2e7d32",background:"#c8e6c9",padding:"2px 8px",borderRadius:8}}>CURRENT</span>}
        </div>)})}
    </div>}

    {/* Property Info */}
    <div className="sec"><h3>Property Info</h3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        <div className="db"><span className="dbl">Start Date</span><span className="dbv">{new Date(p.startDate).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"})}</span></div>
        <div className="db"><span className="dbl">End Date</span><span className="dbv">{p.endDate?new Date(p.endDate).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"}):"Ongoing"}</span></div>
      </div>
      {p.address&&<div style={{padding:"10px 0",borderBottom:"1px solid #eceff1",fontSize:13}}><strong>Address:</strong> {p.address}</div>}
      {own&&p.tenantName&&<div style={{padding:"10px 0",borderBottom:"1px solid #eceff1",fontSize:13}}><strong>Tenant:</strong> {p.tenantName}</div>}
      {!own&&p.ownerName&&<div style={{padding:"10px 0",borderBottom:"1px solid #eceff1",fontSize:13}}><strong>Owner:</strong> {p.ownerName}</div>}
      {p.notes&&<div style={{padding:"10px 0",fontSize:13}}><strong>Notes:</strong> {p.notes}</div>}
    </div>

    {/* Documents */}
    <div className="sec"><DocUp propertyId={p.id} sheetUrl={sheetUrl} documents={s.documents} dispatch={d}/></div>
  </div>}
  <div style={{height:24}}/></div></div>)}

// ═══ COLLECT RENT ═══
function Collect({state:s,dispatch:d,sheetUrl,syncStatus:ss,onSync,onSettings}){const act=s.properties.filter(isA);const[f,setF]=useState({propertyId:"",amount:"",month:""});const[ok,setOk]=useState(false);const[saving,setSaving]=useState(false);
const selProp=f.propertyId?s.properties.find(p=>String(p.id)===String(f.propertyId)):null;
const own=selProp?isOwner(selProp):true;
const months=useMemo(()=>{const m=[];const n=new Date();for(let i=0;i<12;i++){const dt=new Date(n.getFullYear(),n.getMonth()-i,1);m.push(dt.toLocaleDateString("en-IN",{month:"long",year:"numeric"}))}return m},[]);
useEffect(()=>{if(f.propertyId){const p=s.properties.find(p=>String(p.id)===String(f.propertyId));if(p)setF(prev=>({...prev,amount:String(getCurrentSlabRent(p))}))}},[f.propertyId]);
const collect=async()=>{if(!f.propertyId||!f.amount||!f.month)return;setSaving(true);const pl={...f,amount:Number(f.amount),id:Date.now().toString(),date:new Date().toISOString()};if(sheetUrl){const r=await sheetPost(sheetUrl,"addRentRecord",pl);if(r){d({type:"SD",p:r});setOk(true);setSaving(false);setTimeout(()=>{setOk(false);setF({propertyId:"",amount:"",month:""})},1500);return}}d({type:"LAR",p:pl});setOk(true);setSaving(false);setTimeout(()=>{setOk(false);setF({propertyId:"",amount:"",month:""})},1500)};
return(<div className="shell"><div className="topbar"><div className="tl"><h1>{selProp?(own?"Record Collection ↑":"Record Payment ↓"):"Collect / Pay"}</h1></div><div className="tr"><button className="sbtn" onClick={onSync}><span className={"sdot "+ss}/>{IC.sync}</button><button className="gbtn" onClick={onSettings}>{IC.gear}</button></div></div>
<div className="scroll">{act.length===0?<div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"60px 20px",textAlign:"center"}}><div style={{fontSize:52,marginBottom:12}}>📭</div><p className="empty">No active properties.</p><button className="pbtn" onClick={()=>d({type:"SV",p:"addProp"})}>{IC.plus}<span style={{marginLeft:6}}>Add Property</span></button></div>
:<div className="card">{ok&&<div className="succ">{IC.chk} {own?"Collection recorded!":"Payment recorded!"}</div>}
  <label className="lbl">Select Property</label><select className="inp" value={f.propertyId} onChange={e=>setF({...f,propertyId:e.target.value})}><option value="">-- Choose --</option>
    <optgroup label="🏠 Owner (Collect)">{act.filter(isOwner).map(p=><option key={p.id} value={p.id}>{p.name} — {fmt(getCurrentSlabRent(p))}/mo</option>)}</optgroup>
    <optgroup label="🏢 Tenant (Pay)">{act.filter(p=>!isOwner(p)).map(p=><option key={p.id} value={p.id}>{p.name} — {fmt(getCurrentSlabRent(p))}/mo</option>)}</optgroup>
  </select>
  {selProp&&(()=>{const cs=getCurrentStatus(selProp,s.rentRecords);if(!cs)return null;
    return<div style={{background:stCfg[cs.status]?.bg||"#f5f5f5",borderRadius:14,padding:14,marginTop:10,borderLeft:"4px solid "+(stCfg[cs.status]?.border||"#e0e0e0")}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontSize:12,fontWeight:800,color:"#455a64"}}>{own?"Tenant owes":"You owe"}</span><STag status={cs.status} diff={cs.diff}/></div>
      <div style={{display:"flex",gap:16,fontSize:12,color:"#546e7a"}}><div><span style={{fontWeight:700}}>Due:</span> {fmt(cs.due)}</div><div><span style={{fontWeight:700}}>Paid:</span> {fmt(cs.paid)}</div>{cs.carry>0&&<div><span style={{fontWeight:700,color:"#0d47a1"}}>Carry:</span> {fmt(cs.carry)}</div>}</div>
      {cs.payments.length>0&&<div style={{marginTop:8,borderTop:"1px solid rgba(0,0,0,0.08)",paddingTop:8}}><div style={{fontSize:10,fontWeight:800,color:"#90a4ae",textTransform:"uppercase",marginBottom:4}}>Payments this month</div>{cs.payments.map((r,i)=><div key={i} style={{fontSize:12,color:"#455a64",display:"flex",justifyContent:"space-between",padding:"2px 0"}}><span>{new Date(r.date).toLocaleDateString("en-IN",{day:"numeric",month:"short"})}</span><span style={{fontWeight:700,fontFamily:"var(--mono)"}}>{fmt(r.amount)}</span></div>)}</div>}
    </div>})()}
  <label className="lbl">For Month</label><select className="inp" value={f.month} onChange={e=>setF({...f,month:e.target.value})}><option value="">-- Month --</option>{months.map(m=><option key={m} value={m}>{m}</option>)}</select>
  <label className="lbl">Amount (₹)</label><input className="inp" type="number" value={f.amount} onChange={e=>setF({...f,amount:e.target.value})}/>
  <button className="pbtn" disabled={!f.propertyId||!f.amount||!f.month||saving} onClick={collect} style={{background:own?"linear-gradient(135deg,#1b5e20,#388e3c)":"linear-gradient(135deg,#b71c1c,#e53935)"}}>{saving?IC.sync:IC.chk}<span style={{marginLeft:6}}>{saving?"Saving…":own?"Record Collection ↑":"Record Payment ↓"}</span></button>
</div>}
<div style={{height:80}}/></div>
<div className="nav">{[{k:"dashboard",i:IC.home,l:"Dashboard"},{k:"properties",i:IC.bld,l:"Properties"},{k:"collect",i:IC.rup,l:"Collect"}].map(t=><button key={t.k} className={"nb"+(s.view===t.k?" a":"")} onClick={()=>d({type:"SV",p:t.k})}><div className={s.view===t.k?"npill":""}>{t.i}</div><span className="nlbl">{t.l}</span></button>)}</div></div>)}

// ═══ APP ROOT ═══
function App(){const[state,dispatch]=useReducer(reducer,init);const[sheetUrl,setSheetUrl]=useState(null);const[showSetup,setShowSetup]=useState(false);const[syncStatus,setSyncStatus]=useState("offline");
useEffect(()=>{const url=gUrl();const cached=gData();if(cached)dispatch({type:"SD",p:cached});setSheetUrl(url);if(url){setSyncStatus("syncing");doSync(url)}},[]);
const doSync=async url=>{setSyncStatus("syncing");const d=await sheetGet(url);if(d){dispatch({type:"SD",p:d});setSyncStatus("synced")}else setSyncStatus("error")};
const handleSync=()=>sheetUrl&&doSync(sheetUrl);
const handleSaveUrl=url=>{sUrl(url);setSheetUrl(url);setShowSetup(false);if(url){setSyncStatus("syncing");doSync(url)}else setSyncStatus("offline")};
if(sheetUrl===null)return<div className="shell" style={{alignItems:"center",justifyContent:"center"}}><div style={{color:"var(--dk)",animation:"spin 1s linear infinite"}}>{IC.sync}</div><p style={{color:"var(--muted)",marginTop:12}}>Loading…</p></div>;
if(sheetUrl===""&&state.properties.length===0&&!showSetup&&state.view==="dashboard")return<Setup onSave={handleSaveUrl} existing={sheetUrl}/>;
if(showSetup)return<Setup onSave={handleSaveUrl} existing={sheetUrl}/>;
const c={state,dispatch,syncStatus,onSync:handleSync,onSettings:()=>setShowSetup(true),sheetUrl};
switch(state.view){case "dashboard":return<Dash{...c}/>;case "properties":return<PList{...c}/>;case "addProp":return<PForm{...c}/>;case "editProp":return<PForm{...c}/>;case "detail":return<Detail{...c}/>;case "collect":return<Collect{...c}/>;default:return<Dash{...c}/>}}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
<script>if('serviceWorker'in navigator){const c=`self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('Offline'))));`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([c],{type:'application/javascript'}))).catch(()=>{})}</script>


</body></html>
