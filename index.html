function getOrCreateFolder(name){var folders=DriveApp.getFoldersByName(name);return folders.hasNext()?folders.next():DriveApp.createFolder(name)}

const mkK=d=>{const t=new Date(d);return`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}`};
const mkL=k=>{const[y,m]=k.split("-");return new Date(y,m-1).toLocaleDateString("en-IN",{month:"short",year:"numeric"})};
const isA=p=>{const n=new Date(),s=new Date(p.startDate),e=p.endDate?new Date(p.endDate):null;return n>=s&&(!e||n<=e)};
const fSz=b=>{if(b<1024)return b+"B";if(b<1048576)return(b/1024).toFixed(1)+"KB";return(b/1048576).toFixed(1)+"MB"};
const fIc=m=>{if(m&&m.includes("pdf"))return{e:"📄",bg:"#ffebee",c:"#c62828"};if(m&&m.includes("image"))return{e:"🖼️",bg:"#e3f2fd",c:"#1565c0"};if(m&&(m.includes("word")||m.includes("doc")))return{e:"📝",bg:"#e8eaf6",c:"#283593"};return{e:"📎",bg:"#f5f5f5",c:"#455a64"}};

const LK="rt_url",LD="rt_data";
function gUrl(){try{return localStorage.getItem(LK)||""}catch{return""}}function sUrl(u){try{localStorage.setItem(LK,u)}catch{}}
function gData(){try{const d=localStorage.getItem(LD);return d?JSON.parse(d):null}catch{return null}}function sData(d){try{localStorage.setItem(LD,JSON.stringify(d))}catch{}}
async function sheetGet(url){try{const r=await fetch(url);const d=await r.json();if(d.success){sData(d);return d}throw 0}catch{return null}}
async function sheetPost(url,action,payload){try{const r=await fetch(url,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action,payload})});const d=await r.json();if(d.success){sData(d);return d}throw 0}catch{return null}}

const init={properties:[],rentRecords:[],documents:[],view:"dashboard",selProp:null,editProp:null,role:"owner"};

// ═══ DOCUMENT UPLOADER ═══
function DocUp({propertyId,sheetUrl,documents,dispatch:d}){
  const[uploading,setUploading]=useState(false);const[dragOver,setDragOver]=useState(false);const fileRef=useRef();
  const docs=(documents||[]).filter(x=>String(x.propertyId)===String(propertyId));

  const handleFiles=async files=>{if(!files||!files.length)return;
    for(const file of files){if(file.size>10*1024*1024){alert("Max 10MB: "+file.name);continue}
      setUploading(true);const reader=new FileReader();
      reader.onload=async e=>{const b64=e.target.result.split(",")[1];
        const pl={id:Date.now().toString(),propertyId,fileName:file.name,mimeType:file.type,fileSize:file.size,fileData:b64};
        if(sheetUrl){const res=await sheetPost(sheetUrl,"uploadDocument",pl);if(res){d({type:"SD",p:res});setUploading(false);return}}
        d({type:"LDOC",p:{id:pl.id,propertyId,fileName:file.name,mimeType:file.type,fileSize:file.size,viewUrl:"",downloadUrl:"",uploadDate:new Date().toISOString()}});setUploading(false)};
      reader.readAsDataURL(file)}};

  const handleDel=async id=>{if(!confirm("Delete this document?"))return;if(sheetUrl){const r=await sheetPost(sheetUrl,"deleteDocument",{id});if(r){d({type:"SD",p:r});return}}d({type:"RMDOC",p:id})};

  return(
    <div className="sec" style={{marginTop:8}}>
      <h3 style={{display:"flex",alignItems:"center",gap:8}}>{IC.clip} Agreement Documents</h3>
      <div className={"dz"+(dragOver?" drg":"")} onClick={()=>fileRef.current?.click()}
        onDragOver={e=>{e.preventDefault();setDragOver(true)}} onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);handleFiles(e.dataTransfer.files)}}>
        <input ref={fileRef} type="file" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.txt" multiple style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
        {uploading?<div><div style={{color:"var(--dk)",fontWeight:700,fontSize:13,marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><span style={{animation:"spin 1s linear infinite",display:"inline-flex"}}>{IC.sync}</span> Uploading to Google Drive…</div><div className="uprog"><div className="ubar" style={{width:"70%"}}/></div></div>
        :<div><div style={{color:"var(--dk)",marginBottom:6}}>{IC.upload}</div><div style={{fontWeight:700,fontSize:13,color:"var(--dk)"}}>Tap to upload or drag files here</div><div style={{fontSize:11,color:"var(--subtle)",marginTop:4}}>PDF, DOC, DOCX, JPG, PNG · Max 10MB each</div></div>}
      </div>
      {docs.length>0&&<div style={{marginTop:12}}>{docs.map(doc=>{const fi=fIc(doc.mimeType);return(
        <div key={doc.id} className="dc"><div className="di" style={{background:fi.bg,color:fi.c}}>{fi.e}</div>
          <div className="dinfo"><div className="dn">{doc.fileName}</div><div className="dm">{doc.fileSize?fSz(Number(doc.fileSize)):""}{doc.uploadDate?" · "+new Date(doc.uploadDate).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"}):""}
          </div></div>
          <div className="da">
            {doc.viewUrl&&<a href={doc.viewUrl} target="_blank" rel="noopener" className="dab" style={{background:"#e3f2fd",color:"#1565c0"}}>{IC.eye}</a>}
            {doc.downloadUrl&&<a href={doc.downloadUrl} target="_blank" rel="noopener" className="dab" style={{background:"#e8f5e9",color:"#2e7d32"}}>{IC.download}</a>}
            <button className="dab" style={{background:"#ffebee",color:"#c62828"}} onClick={()=>handleDel(doc.id)}>{IC.del}</button>
          </div></div>)})}</div>}
      {docs.length===0&&!uploading&&<p style={{fontSize:12,color:"var(--subtle)",marginTop:10,textAlign:"center"}}>No documents uploaded yet</p>}
    </div>);
}

    <div className="scroll">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><h2 style={{fontSize:21,fontWeight:800,color:"var(--dk)",margin:0}}>{p.name}</h2><span className={"chip "+(isA(p)?"ac":"en")}><span className="cdot"/>{isA(p)?"Active":"Ended"}</span></div>
      {p.address&&<p style={{color:"var(--muted)",fontSize:13,marginBottom:16,marginTop:2}}>{p.address}</p>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        <div className="db"><span className="dbl">Rent</span><span className="dbv">{fmt(p.rentAmount)}</span></div><div className="db"><span className="dbl">Collected</span><span className="dbv">{fmt(total)}</span></div>
        {p.deposit&&Number(p.deposit)>0&&<div className="db" style={{background:"#e3f2fd"}}><span className="dbl">Deposit</span><span className="dbv" style={{color:"#0d47a1"}}>{fmt(p.deposit)}</span></div>}
        <div className="db"><span className="dbl">Start</span><span className="dbv">{new Date(p.startDate).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"})}</span></div>
        <div className="db"><span className="dbl">End</span><span className="dbv">{p.endDate?new Date(p.endDate).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"}):"Ongoing"}</span></div>
      </div>
      <div className="card" style={{padding:14,fontSize:13,color:"#455a64",lineHeight:1.6}}>{p.role==="owner"&&p.tenantName&&<p><strong>Tenant:</strong> {p.tenantName}</p>}{p.role==="tenant"&&p.ownerName&&<p><strong>Owner:</strong> {p.ownerName}</p>}{p.notes&&<p><strong>Notes:</strong> {p.notes}</p>}</div>
      <div style={{display:"flex",gap:10,marginBottom:8}}><button className="obtn" onClick={()=>d({type:"EDT",p:p.id})}>{IC.edit}<span style={{marginLeft:4}}>Edit</span></button><button className="dbtn" onClick={hDel}>{IC.del}<span style={{marginLeft:4}}>Delete</span></button></div>
      <DocUp propertyId={p.id} sheetUrl={sheetUrl} documents={s.documents} dispatch={d}/>
      <div className="sec" style={{marginTop:8}}><h3>Rent History</h3>{recs.length===0?<p className="empty">No rent collected yet.</p>:recs.slice().reverse().map(r=><div key={r.id} className="li"><div><div className="lit">{r.month}</div><div className="lis">{new Date(r.date).toLocaleDateString("en-IN")}</div></div><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontWeight:800,color:"var(--dk)",fontFamily:"var(--mono)"}}>{fmt(r.amount)}</span><button style={{background:"none",border:"none",color:"#b0bec5",cursor:"pointer",padding:4,display:"flex"}} onClick={()=>hDelR(r.id)}>{IC.del}</button></div></div>)}</div>
      <div style={{height:24}}/></div></div>);
}

// ═══ COLLECT ═══
function Collect({state:s,dispatch:d,sheetUrl,syncStatus:ss,onSync,onSettings}){const act=s.properties.filter(isA);const[f,setF]=useState({propertyId:"",amount:"",month:""});const[ok,setOk]=useState(false);const[saving,setSaving]=useState(false);
  const months=useMemo(()=>{const m=[];const n=new Date();for(let i=0;i<12;i++){const dt=new Date(n.getFullYear(),n.getMonth()-i,1);m.push(dt.toLocaleDateString("en-IN",{month:"long",year:"numeric"}))}return m},[]);
  useEffect(()=>{if(f.propertyId){const p=s.properties.find(p=>String(p.id)===String(f.propertyId));if(p)setF(prev=>({...prev,amount:String(p.rentAmount)}))}},[f.propertyId]);
  const collect=async()=>{if(!f.propertyId||!f.amount||!f.month)return;setSaving(true);const pl={...f,amount:Number(f.amount),id:Date.now().toString(),date:new Date().toISOString()};if(sheetUrl){const r=await sheetPost(sheetUrl,"addRentRecord",pl);if(r){d({type:"SD",p:r});setOk(true);setSaving(false);setTimeout(()=>{setOk(false);setF({propertyId:"",amount:"",month:""})},1500);return}}d({type:"LAR",p:pl});setOk(true);setSaving(false);setTimeout(()=>{setOk(false);setF({propertyId:"",amount:"",month:""})},1500)};
  return(<div className="shell"><div className="topbar"><div className="tl"><h1>Collect Rent</h1></div><div className="tr"><button className="sbtn" onClick={onSync}><span className={"sdot "+ss}/>{IC.sync}</button><button className="gbtn" onClick={onSettings}>{IC.gear}</button></div></div>
    <div className="scroll">{act.length===0?<div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"60px 20px",textAlign:"center"}}><div style={{fontSize:52,marginBottom:12}}>📭</div><p className="empty">No active properties.</p><button className="pbtn" onClick={()=>d({type:"SV",p:"addProp"})}>{IC.plus}<span style={{marginLeft:6}}>Add Property</span></button></div>
      :<div className="card">{ok&&<div className="succ">{IC.chk} Rent collected!</div>}
        <label className="lbl">Select Property</label><select className="inp" value={f.propertyId} onChange={e=>setF({...f,propertyId:e.target.value})}><option value="">-- Choose --</option>{act.map(p=><option key={p.id} value={p.id}>{p.name} — {fmt(p.rentAmount)}/mo</option>)}</select>
        <label className="lbl">For Month</label><select className="inp" value={f.month} onChange={e=>setF({...f,month:e.target.value})}><option value="">-- Month --</option>{months.map(m=><option key={m} value={m}>{m}</option>)}</select>
        <label className="lbl">Amount (₹)</label><input className="inp" type="number" value={f.amount} onChange={e=>setF({...f,amount:e.target.value})}/>
        <button className="pbtn" disabled={!f.propertyId||!f.amount||!f.month||saving} onClick={collect}>{saving?IC.sync:IC.chk}<span style={{marginLeft:6}}>{saving?"Saving…":"Record Payment"}</span></button></div>}
      <div style={{height:80}}/></div>
    <div className="nav">{[{k:"dashboard",i:IC.home,l:"Dashboard"},{k:"properties",i:IC.bld,l:"Properties"},{k:"collect",i:IC.rup,l:"Collect"}].map(t=><button key={t.k} className={"nb"+(s.view===t.k?" a":"")} onClick={()=>d({type:"SV",p:t.k})}><div className={s.view===t.k?"npill":""}>{t.i}</div><span className="nlbl">{t.l}</span></button>)}</div></div>);
}

// ═══ APP ═══
function App(){const[state,dispatch]=useReducer(reducer,init);const[sheetUrl,setSheetUrl]=useState(null);const[showSetup,setShowSetup]=useState(false);const[syncStatus,setSyncStatus]=useState("offline");
  useEffect(()=>{const url=gUrl();const cached=gData();if(cached)dispatch({type:"SD",p:cached});setSheetUrl(url);if(url){setSyncStatus("syncing");doSync(url)}},[]);
  const doSync=async url=>{setSyncStatus("syncing");const d=await sheetGet(url);if(d){dispatch({type:"SD",p:d});setSyncStatus("synced")}else setSyncStatus("error")};
  const handleSync=()=>sheetUrl&&doSync(sheetUrl);
  const handleSaveUrl=url=>{sUrl(url);setSheetUrl(url);setShowSetup(false);if(url){setSyncStatus("syncing");doSync(url)}else setSyncStatus("offline")};
  if(sheetUrl===null)return<div className="shell" style={{alignItems:"center",justifyContent:"center"}}><div style={{color:"var(--dk)",animation:"spin 1s linear infinite"}}>{IC.sync}</div><p style={{color:"var(--muted)",marginTop:12}}>Loading…</p></div>;
  if(sheetUrl===""&&state.properties.length===0&&!showSetup&&state.view==="dashboard")return<Setup onSave={handleSaveUrl} existing={sheetUrl}/>;
  if(showSetup)return<Setup onSave={handleSaveUrl} existing={sheetUrl}/>;
  const c={state,dispatch,syncStatus,onSync:handleSync,onSettings:()=>setShowSetup(true),sheetUrl};
  switch(state.view){case "dashboard":return<Dash{...c}/>;case "properties":return<PList{...c}/>;case "addProp":return<PForm{...c}/>;case "editProp":return<PForm{...c}/>;case "detail":return<Detail{...c}/>;case "collect":return<Collect{...c}/>;default:return<Dash{...c}/>}
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
<script>if('serviceWorker'in navigator){const c=`self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('Offline'))));`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([c],{type:'application/javascript'}))).catch(()=>{})}</script>
</body>
