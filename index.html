// ═══ HELPERS ═══
const fmt=n=>new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(Number(n)||0);
const mkK=d=>{const t=new Date(d);return`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}`};
const mkL=k=>{const[y,m]=k.split("-");return new Date(y,m-1).toLocaleDateString("en-IN",{month:"short",year:"numeric"})};
const isA=p=>{const n=new Date(),s=new Date(p.startDate),e=p.endDate?new Date(p.endDate):null;return n>=s&&(!e||n<=e)};
const fSz=b=>{if(b<1024)return b+"B";if(b<1048576)return(b/1024).toFixed(1)+"KB";return(b/1048576).toFixed(1)+"MB"};
const fIc=m=>{if(m&&m.includes("pdf"))return{e:"📄",bg:"#ffebee",c:"#c62828"};if(m&&m.includes("image"))return{e:"🖼️",bg:"#e3f2fd",c:"#1565c0"};if(m&&(m.includes("word")||m.includes("doc")))return{e:"📝",bg:"#e8eaf6",c:"#283593"};return{e:"📎",bg:"#f5f5f5",c:"#455a64"}};
const isOwner=p=>p.role==="owner";

// ═══ SMART LEDGER ═══
function calcLedger(property,allRecords){const rent=Number(property.rentAmount)||0;const pr=allRecords.filter(r=>String(r.propertyId)===String(property.id));const start=new Date(property.startDate);const now=new Date();const end=property.endDate?new Date(property.endDate):now;const months=[];let carry=0;let d=new Date(start.getFullYear(),start.getMonth(),1);const limit=new Date(Math.min(end.getTime(),now.getTime()));limit.setDate(28);
while(d<=limit){const mk=mkK(d);const payments=pr.filter(r=>mkK(r.date)===mk);const paid=payments.reduce((s,r)=>s+Number(r.amount),0);const due=Math.max(rent-carry,0);const effective=carry+paid;let status,diff;
if(effective>=rent){carry=effective-rent;if(paid===0&&carry>=rent){status="carry";diff=carry}else if(effective>rent&&paid>0){status="overpaid";diff=carry}else{status="paid";diff=0}}else{status=paid===0?"unpaid":"partial";diff=rent-effective;carry=0}
months.push({mk,label:mkL(mk),rent,due,paid,carry,status,diff,payments});d=new Date(d.getFullYear(),d.getMonth()+1,1)}return months}
function getCurrentStatus(p,recs){const l=calcLedger(p,recs);const mk=mkK(new Date());return l.find(m=>m.mk===mk)||null}
const stCfg={paid:{label:"PAID",emoji:"✅",bg:"#e8f5e9",color:"#2e7d32",border:"#a5d6a7"},partial:{label:"PARTIAL",emoji:"⚠️",bg:"#fff3e0",color:"#e65100",border:"#ffcc80"},unpaid:{label:"UNPAID",emoji:"❌",bg:"#ffebee",color:"#c62828",border:"#ef9a9a"},overpaid:{label:"OVERPAID",emoji:"💰",bg:"#e3f2fd",color:"#0d47a1",border:"#90caf9"},carry:{label:"CARRIED",emoji:"➡️",bg:"#e3f2fd",color:"#0d47a1",border:"#90caf9"}};
function STag({status,diff,small}){const c=stCfg[status]||stCfg.unpaid;return<span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:small?9:10,fontWeight:800,padding:small?"2px 6px":"3px 10px",borderRadius:20,background:c.bg,color:c.color,letterSpacing:.5,whiteSpace:"nowrap"}}>{c.emoji} {c.label}{diff>0&&status!=="paid"?" "+fmt(diff):""}</span>}

// ═══ STORAGE & API ═══

const handleDel=async id=>{if(!confirm("Delete this document?"))return;if(sheetUrl){const r=await sheetPost(sheetUrl,"deleteDocument",{id});if(r){d({type:"SD",p:r});return}}d({type:"RMDOC",p:id})};

{uploading?<div><div style={{color:"var(--dk)",fontWeight:700,fontSize:13,marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><span style={{animation:"spin 1s linear infinite",display:"inline-flex"}}>{IC.sync}</span> Uploading…</div><div className="uprog"><div className="ubar" style={{width:"70%"}}/></div></div>

</div></div><div className="da">{doc.viewUrl&&<a href={doc.viewUrl} target="_blank" rel="noopener" className="dab" style={{background:"#e3f2fd",color:"#1565c0"}}>{IC.eye}</a>}{doc.downloadUrl&&<a href={doc.downloadUrl} target="_blank" rel="noopener" className="dab" style={{background:"#e8f5e9",color:"#2e7d32"}}>{IC.download}</a>}<button className="dab" style={{background:"#ffebee",color:"#c62828"}} onClick={()=>handleDel(doc.id)}>{IC.del}</button></div></div>})}</div>}

function Dash({state:s,dispatch:d,syncStatus:ss,onSync,onSettings}){const now=new Date(),mk=mkK(now),recs=s.rentRecords;
const ownerProps=s.properties.filter(p=>isOwner(p)&&isA(p));const tenantProps=s.properties.filter(p=>!isOwner(p)&&isA(p));
const collected=recs.filter(r=>{const p=s.properties.find(p=>String(p.id)===String(r.propertyId));return p&&isOwner(p)&&mkK(r.date)===mk}).reduce((a,r)=>a+Number(r.amount),0);
const paid=recs.filter(r=>{const p=s.properties.find(p=>String(p.id)===String(r.propertyId));return p&&!isOwner(p)&&mkK(r.date)===mk}).reduce((a,r)=>a+Number(r.amount),0);
const expCollect=ownerProps.reduce((a,p)=>a+Number(p.rentAmount),0);
const expPay=tenantProps.reduce((a,p)=>a+Number(p.rentAmount),0);

const l6=useMemo(()=>{const ms=[];for(let i=5;i>=0;i--){const dt=new Date(now.getFullYear(),now.getMonth()-i,1);ms.push(mkK(dt))}
return ms.map(m=>{const inc=recs.filter(r=>{const p=s.properties.find(p=>String(p.id)===String(r.propertyId));return p&&isOwner(p)&&mkK(r.date)===m}).reduce((a,r)=>a+Number(r.amount),0);
const exp=recs.filter(r=>{const p=s.properties.find(p=>String(p.id)===String(r.propertyId));return p&&!isOwner(p)&&mkK(r.date)===m}).reduce((a,r)=>a+Number(r.amount),0);
return{key:m,label:mkL(m),inc,exp}})},[recs,s.properties]);
const mx=Math.max(...l6.map(m=>Math.max(m.inc,m.exp)),1);

return(<div className="shell"><div className="topbar"><div className="tl"><h1>Dashboard</h1></div><div className="tr"><button className="sbtn" onClick={onSync}><span className={"sdot "+ss}/>{ss==="synced"?"Synced":ss==="syncing"?"…":ss==="error"?"Error":"Local"}{IC.sync}</button><button className="gbtn" onClick={onSettings}>{IC.gear}</button></div></div>

    <div className="sc" style={{background:"linear-gradient(135deg,#b71c1c,#e53935)"}}><span className="scl">Rent Paid ↓</span><span className="scv">{fmt(paid)}</span><span className="scs">of {fmt(expPay)} for {tenantProps.length} properties</span></div>
  </div>

    <div className="sc" style={{background:"linear-gradient(135deg,#33691e,#558b2f)"}}><span className="scl">Documents</span><span className="scv">{(s.documents||[]).length}</span><span className="scs">uploaded</span></div>
  </div>

  <RentAlert properties={s.properties} rentRecords={recs}/>

    <div style={{display:"flex",gap:12,marginBottom:8,justifyContent:"center"}}><span style={{display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#2e7d32"}}><span style={{width:10,height:10,borderRadius:3,background:"linear-gradient(180deg,#66bb6a,#1b5e20)"}}/>Collected</span><span style={{display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,color:"#c62828"}}><span style={{width:10,height:10,borderRadius:3,background:"linear-gradient(180deg,#ef9a9a,#b71c1c)"}}/>Paid</span></div>
    <div className="bar-c">{l6.map(m=><div key={m.key} className="bar-col">

        <div className="bar" style={{width:"45%",height:Math.max((m.exp/mx)*110,4)+"px",background:"linear-gradient(180deg,#ef9a9a,#b71c1c)"}}/>

const[page,setPage]=useState(0); // 0=Overview, 1=Details
const recs=s.rentRecords.filter(r=>String(r.propertyId)===String(p.id));
const total=recs.reduce((a,r)=>a+Number(r.amount),0);
const own=isOwner(p);
const hDel=async()=>{if(!confirm("Delete property, records & documents?"))return;if(sheetUrl){const r=await sheetPost(sheetUrl,"deleteProperty",{id:p.id});if(r){d({type:"SD",p:r});d({type:"SV",p:"properties"});return}}d({type:"LDP",p:p.id})};
const hDelR=async id=>{if(sheetUrl){const r=await sheetPost(sheetUrl,"deleteRentRecord",{id});if(r){d({type:"SD",p:r});return}}d({type:"LDR",p:id})};

return(<div className="shell"><div className="topbar"><div className="tl"><button className="bbtn" onClick={()=>d({type:"SV",p:"properties"})}>{IC.back}</button><h1>{p.name}</h1></div><span className={"rbadge "+(own?"owner":"tenant")} style={{marginRight:4}}>{own?"Owner":"Tenant"}</span></div>
<div className="scroll">
  {/* Page tabs */}
  <div className="ptabs"><button className={"ptab"+(page===0?" a":"")} onClick={()=>setPage(0)}>Overview</button><button className={"ptab"+(page===1?" a":"")} onClick={()=>setPage(1)}>Details</button></div>

  {page===0&&<div style={{animation:"slideR .25s ease"}}>
    {/* Status header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div><span className={"chip "+(isA(p)?"ac":"en")}><span className="cdot"/>{isA(p)?"Active":"Ended"}</span></div>
      {isA(p)&&(()=>{const cs=getCurrentStatus(p,s.rentRecords);return cs?<STag status={cs.status} diff={cs.diff}/>:null})()}
    </div>

    {/* Core stats */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
      <div className="db"><span className="dbl">Rent/Month</span><span className="dbv">{fmt(p.rentAmount)}</span></div>
      <div className="db"><span className="dbl">Total {own?"Collected":"Paid"}</span><span className="dbv">{fmt(total)}</span></div>
    </div>

    {/* Actions */}
    <div style={{display:"flex",gap:10,marginBottom:14}}><button className="obtn" onClick={()=>d({type:"EDT",p:p.id})}>{IC.edit}<span style={{marginLeft:4}}>Edit</span></button><button className="dbtn2" onClick={hDel}>{IC.del}<span style={{marginLeft:4}}>Delete</span></button></div>

    {/* Rent Ledger */}
    <div className="sec"><h3>Rent Ledger</h3>
    {(()=>{const ledger=calcLedger(p,s.rentRecords);if(ledger.length===0)return<p className="empty">No history yet.</p>;
      return ledger.slice().reverse().map(m=>
        <div key={m.mk} style={{padding:"12px 0",borderBottom:"1px solid #eceff1"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:m.payments.length>0?6:0}}>
            <div><div className="lit">{m.label}</div><div className="lis">Due: {fmt(m.due)}{m.carry>0?" · Carry: "+fmt(m.carry):""}</div></div>
            <STag status={m.status} diff={m.diff}/></div>
          {m.payments.length>0&&m.payments.map((r,i)=>
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginLeft:12,padding:"4px 0"}}>
              <span style={{width:4,height:4,borderRadius:"50%",background:"var(--subtle)",flexShrink:0}}/>
              <span style={{fontSize:12,color:"#546e7a",flex:1}}>{new Date(r.date).toLocaleDateString("en-IN",{day:"numeric",month:"short"})}</span>
              <span style={{fontWeight:800,color:"var(--dk)",fontFamily:"var(--mono)",fontSize:13}}>{fmt(r.amount)}</span>
              <button style={{background:"none",border:"none",color:"#b0bec5",cursor:"pointer",padding:4,display:"flex"}} onClick={()=>hDelR(r.id)}>{IC.del}</button></div>)}
        </div>)})()}
    </div>
  </div>}

  {page===1&&<div style={{animation:"slideL .25s ease"}}>
    {/* Deposit */}
    <div className="sec">
      <h3>{own?"Deposit Received":"Deposit Paid"}</h3>
      {p.deposit&&Number(p.deposit)>0?
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{background:own?"#e8f5e9":"#ffebee",borderRadius:14,padding:"16px 20px",flex:1,textAlign:"center"}}>
            <div style={{fontSize:11,fontWeight:800,color:own?"#2e7d32":"#c62828",textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>{own?"Received from Tenant":"Paid to Owner"}</div>
            <div style={{fontSize:24,fontWeight:800,color:own?"#1b5e20":"#b71c1c",fontFamily:"var(--mono)"}}>{fmt(p.deposit)}</div>
          </div>
        </div>
        :<p style={{fontSize:13,color:"var(--subtle)"}}>No deposit recorded</p>}
    </div>

    {/* Property Info */}
    <div className="sec"><h3>Property Info</h3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        <div className="db"><span className="dbl">Start Date</span><span className="dbv">{new Date(p.startDate).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"})}</span></div>
        <div className="db"><span className="dbl">End Date</span><span className="dbv">{p.endDate?new Date(p.endDate).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"2-digit"}):"Ongoing"}</span></div>
      </div>
      {p.address&&<div style={{padding:"10px 0",borderBottom:"1px solid #eceff1",fontSize:13}}><strong>Address:</strong> {p.address}</div>}
      {own&&p.tenantName&&<div style={{padding:"10px 0",borderBottom:"1px solid #eceff1",fontSize:13}}><strong>Tenant:</strong> {p.tenantName}</div>}
      {!own&&p.ownerName&&<div style={{padding:"10px 0",borderBottom:"1px solid #eceff1",fontSize:13}}><strong>Owner:</strong> {p.ownerName}</div>}
      {p.notes&&<div style={{padding:"10px 0",fontSize:13}}><strong>Notes:</strong> {p.notes}</div>}
    </div>

    {/* Documents */}
    <div className="sec"><DocUp propertyId={p.id} sheetUrl={sheetUrl} documents={s.documents} dispatch={d}/></div>
  </div>}
  <div style={{height:24}}/></div></div>)}

// ═══ COLLECT RENT ═══
function Collect({state:s,dispatch:d,sheetUrl,syncStatus:ss,onSync,onSettings}){const act=s.properties.filter(isA);const[f,setF]=useState({propertyId:"",amount:"",month:""});const[ok,setOk]=useState(false);const[saving,setSaving]=useState(false);
const selProp=f.propertyId?s.properties.find(p=>String(p.id)===String(f.propertyId)):null;
const own=selProp?isOwner(selProp):true;
const months=useMemo(()=>{const m=[];const n=new Date();for(let i=0;i<12;i++){const dt=new Date(n.getFullYear(),n.getMonth()-i,1);m.push(dt.toLocaleDateString("en-IN",{month:"long",year:"numeric"}))}return m},[]);
useEffect(()=>{if(f.propertyId){const p=s.properties.find(p=>String(p.id)===String(f.propertyId));if(p)setF(prev=>({...prev,amount:String(p.rentAmount)}))}},[f.propertyId]);
const collect=async()=>{if(!f.propertyId||!f.amount||!f.month)return;setSaving(true);const pl={...f,amount:Number(f.amount),id:Date.now().toString(),date:new Date().toISOString()};if(sheetUrl){const r=await sheetPost(sheetUrl,"addRentRecord",pl);if(r){d({type:"SD",p:r});setOk(true);setSaving(false);setTimeout(()=>{setOk(false);setF({propertyId:"",amount:"",month:""})},1500);return}}d({type:"LAR",p:pl});setOk(true);setSaving(false);setTimeout(()=>{setOk(false);setF({propertyId:"",amount:"",month:""})},1500)};
return(<div className="shell"><div className="topbar"><div className="tl"><h1>{selProp?(own?"Record Collection ↑":"Record Payment ↓"):"Collect / Pay"}</h1></div><div className="tr"><button className="sbtn" onClick={onSync}><span className={"sdot "+ss}/>{IC.sync}</button><button className="gbtn" onClick={onSettings}>{IC.gear}</button></div></div>
<div className="scroll">{act.length===0?<div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"60px 20px",textAlign:"center"}}><div style={{fontSize:52,marginBottom:12}}>📭</div><p className="empty">No active properties.</p><button className="pbtn" onClick={()=>d({type:"SV",p:"addProp"})}>{IC.plus}<span style={{marginLeft:6}}>Add Property</span></button></div>
:<div className="card">{ok&&<div className="succ">{IC.chk} {own?"Collection recorded!":"Payment recorded!"}</div>}
  <label className="lbl">Select Property</label><select className="inp" value={f.propertyId} onChange={e=>setF({...f,propertyId:e.target.value})}><option value="">-- Choose --</option>
    <optgroup label="🏠 Owner (Collect)">{act.filter(isOwner).map(p=><option key={p.id} value={p.id}>{p.name} — {fmt(p.rentAmount)}/mo</option>)}</optgroup>
    <optgroup label="🏢 Tenant (Pay)">{act.filter(p=>!isOwner(p)).map(p=><option key={p.id} value={p.id}>{p.name} — {fmt(p.rentAmount)}/mo</option>)}</optgroup>
  </select>
  {selProp&&(()=>{const cs=getCurrentStatus(selProp,s.rentRecords);if(!cs)return null;
    return<div style={{background:stCfg[cs.status]?.bg||"#f5f5f5",borderRadius:14,padding:14,marginTop:10,borderLeft:"4px solid "+(stCfg[cs.status]?.border||"#e0e0e0")}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontSize:12,fontWeight:800,color:"#455a64"}}>{own?"Tenant owes":"You owe"}</span><STag status={cs.status} diff={cs.diff}/></div>
      <div style={{display:"flex",gap:16,fontSize:12,color:"#546e7a"}}><div><span style={{fontWeight:700}}>Due:</span> {fmt(cs.due)}</div><div><span style={{fontWeight:700}}>Paid:</span> {fmt(cs.paid)}</div>{cs.carry>0&&<div><span style={{fontWeight:700,color:"#0d47a1"}}>Carry:</span> {fmt(cs.carry)}</div>}</div>
      {cs.payments.length>0&&<div style={{marginTop:8,borderTop:"1px solid rgba(0,0,0,0.08)",paddingTop:8}}><div style={{fontSize:10,fontWeight:800,color:"#90a4ae",textTransform:"uppercase",marginBottom:4}}>Payments this month</div>{cs.payments.map((r,i)=><div key={i} style={{fontSize:12,color:"#455a64",display:"flex",justifyContent:"space-between",padding:"2px 0"}}><span>{new Date(r.date).toLocaleDateString("en-IN",{day:"numeric",month:"short"})}</span><span style={{fontWeight:700,fontFamily:"var(--mono)"}}>{fmt(r.amount)}</span></div>)}</div>}
    </div>})()}
  <label className="lbl">For Month</label><select className="inp" value={f.month} onChange={e=>setF({...f,month:e.target.value})}><option value="">-- Month --</option>{months.map(m=><option key={m} value={m}>{m}</option>)}</select>
  <label className="lbl">Amount (₹)</label><input className="inp" type="number" value={f.amount} onChange={e=>setF({...f,amount:e.target.value})}/>
  <button className="pbtn" disabled={!f.propertyId||!f.amount||!f.month||saving} onClick={collect} style={{background:own?"linear-gradient(135deg,#1b5e20,#388e3c)":"linear-gradient(135deg,#b71c1c,#e53935)"}}>{saving?IC.sync:IC.chk}<span style={{marginLeft:6}}>{saving?"Saving…":own?"Record Collection ↑":"Record Payment ↓"}</span></button>
</div>}
<div style={{height:80}}/></div>
<div className="nav">{[{k:"dashboard",i:IC.home,l:"Dashboard"},{k:"properties",i:IC.bld,l:"Properties"},{k:"collect",i:IC.rup,l:"Collect"}].map(t=><button key={t.k} className={"nb"+(s.view===t.k?" a":"")} onClick={()=>d({type:"SV",p:t.k})}><div className={s.view===t.k?"npill":""}>{t.i}</div><span className="nlbl">{t.l}</span></button>)}</div></div>)}

// ═══ APP ROOT ═══
function App(){const[state,dispatch]=useReducer(reducer,init);const[sheetUrl,setSheetUrl]=useState(null);const[showSetup,setShowSetup]=useState(false);const[syncStatus,setSyncStatus]=useState("offline");
useEffect(()=>{const url=gUrl();const cached=gData();if(cached)dispatch({type:"SD",p:cached});setSheetUrl(url);if(url){setSyncStatus("syncing");doSync(url)}},[]);
const doSync=async url=>{setSyncStatus("syncing");const d=await sheetGet(url);if(d){dispatch({type:"SD",p:d});setSyncStatus("synced")}else setSyncStatus("error")};
const handleSync=()=>sheetUrl&&doSync(sheetUrl);
const handleSaveUrl=url=>{sUrl(url);setSheetUrl(url);setShowSetup(false);if(url){setSyncStatus("syncing");doSync(url)}else setSyncStatus("offline")};
if(sheetUrl===null)return<div className="shell" style={{alignItems:"center",justifyContent:"center"}}><div style={{color:"var(--dk)",animation:"spin 1s linear infinite"}}>{IC.sync}</div><p style={{color:"var(--muted)",marginTop:12}}>Loading…</p></div>;
if(sheetUrl===""&&state.properties.length===0&&!showSetup&&state.view==="dashboard")return<Setup onSave={handleSaveUrl} existing={sheetUrl}/>;
if(showSetup)return<Setup onSave={handleSaveUrl} existing={sheetUrl}/>;
const c={state,dispatch,syncStatus,onSync:handleSync,onSettings:()=>setShowSetup(true),sheetUrl};
switch(state.view){case "dashboard":return<Dash{...c}/>;case "properties":return<PList{...c}/>;case "addProp":return<PForm{...c}/>;case "editProp":return<PForm{...c}/>;case "detail":return<Detail{...c}/>;case "collect":return<Collect{...c}/>;default:return<Dash{...c}/>}}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
<script>if('serviceWorker'in navigator){const c=`self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('Offline'))));`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([c],{type:'application/javascript'}))).catch(()=>{})}</script>
</body>
</html>
